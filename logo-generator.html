<!DOCTYPE html>
<html><head><meta charset="utf-8"></head>
<body>
<canvas id="c" width="512" height="512"></canvas>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');

// Background - dark gradient
const bg = ctx.createRadialGradient(256, 256, 0, 256, 256, 360);
bg.addColorStop(0, '#1a1a2e');
bg.addColorStop(1, '#0f0f1a');
ctx.fillStyle = bg;
ctx.fillRect(0, 0, 512, 512);

// Anvil shape (forging metaphor)
ctx.fillStyle = '#2d2d44';
ctx.beginPath();
ctx.moveTo(156, 340);
ctx.lineTo(356, 340);
ctx.lineTo(376, 380);
ctx.lineTo(136, 380);
ctx.closePath();
ctx.fill();

// Anvil base
ctx.fillStyle = '#252538';
ctx.fillRect(186, 380, 140, 40);

// Hammer (striking)
ctx.save();
ctx.translate(256, 200);
ctx.rotate(-0.4);
// Handle
ctx.fillStyle = '#8B6914';
ctx.fillRect(-4, -80, 8, 120);
// Head
ctx.fillStyle = '#C0C0C0';
ctx.fillRect(-25, -95, 50, 30);
ctx.restore();

// Sparks (skill creation)
const sparkColors = ['#FFD700', '#FF6B35', '#00D4FF', '#7B68EE', '#FF1493'];
for (let i = 0; i < 12; i++) {
  const angle = (i / 12) * Math.PI * 2 + 0.3;
  const dist = 60 + Math.random() * 40;
  const x = 256 + Math.cos(angle) * dist;
  const y = 280 + Math.sin(angle) * dist * 0.6;
  const size = 3 + Math.random() * 4;
  ctx.fillStyle = sparkColors[i % sparkColors.length];
  ctx.beginPath();
  ctx.arc(x, y, size, 0, Math.PI * 2);
  ctx.fill();
}

// Central glow
const glow = ctx.createRadialGradient(256, 300, 0, 256, 300, 80);
glow.addColorStop(0, 'rgba(255, 165, 0, 0.3)');
glow.addColorStop(1, 'rgba(255, 165, 0, 0)');
ctx.fillStyle = glow;
ctx.fillRect(0, 0, 512, 512);

// Text: SF monogram
ctx.font = 'bold 120px "Segoe UI", Arial';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
const tg = ctx.createLinearGradient(180, 120, 330, 220);
tg.addColorStop(0, '#FFD700');
tg.addColorStop(0.5, '#FF8C00');
tg.addColorStop(1, '#FF4500');
ctx.fillStyle = tg;
ctx.fillText('SF', 256, 170);

// Subtitle
ctx.font = '600 24px "Segoe UI", Arial';
ctx.fillStyle = '#8888AA';
ctx.fillText('SKILL FORGE', 256, 440);

// Ring around SF
ctx.strokeStyle = 'rgba(255, 215, 0, 0.4)';
ctx.lineWidth = 2;
ctx.beginPath();
ctx.arc(256, 170, 80, 0, Math.PI * 2);
ctx.stroke();

// Export
const link = document.createElement('a');
link.download = 'skill-forge-logo.png';
link.href = c.toDataURL('image/png');
document.body.appendChild(link);
document.title = 'DONE - Right-click canvas to save';
</script>
</body></html>
